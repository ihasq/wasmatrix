name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        run: npm run coverage:codecov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./wasmatrix/coverage/codecov.lcov.info
          disable_search: true
          flags: node
          name: node-coverage
          fail_ci_if_error: true
          use_oidc: true
