<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="WASMatrix social card">
  <defs>
    <style>
      .title {
        font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
        font-weight: 800;
        letter-spacing: 0;
      }

      .matrix-number {
