      <stop offset=".48" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="farSoftness" x="-20%" y="-20%" width="140%" height="140%">
